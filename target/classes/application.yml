spring:
  application:
    name: dtll-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/dtll_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[jdbc.batch_size]": 50
        "[order_inserts]": true
        "[order_updates]": true

server:
  port: 8080

