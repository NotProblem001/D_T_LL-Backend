services:
  - type: web
    name: dtll-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: dtll-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dtll-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dtll-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: dtll-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dtll-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false # URLs de Vercel de Admin/Dashboard/Landing-Page, separadas por coma
      - key: OSRM_URL
        sync: false # Opcional: dejar vacía usa distancia en línea recta (Haversine), sin costo.
                     # Solo completar si en algún momento se paga un servicio OSRM propio o externo.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false

databases:
  # Nota 1: si el plan de Postgres administrado de Render no habilita la extensión PostGIS,
  # usar en su lugar un proveedor externo compatible (Neon, Supabase): quitar los 5 bindings
  # fromDatabase de dtll-backend y setear DATABASE_URL manualmente con el JDBC URL completo
  # (jdbc:postgresql://host:puerto/db?sslmode=require) como variable sync:false.
  # Nota 2 (IMPORTANTE): el plan `free` de Postgres en Render se BORRA automáticamente a los
  # 30 días de creado (no es renovable indefinidamente). Para no perder datos hay que migrar a
  # un plan pago antes de esa fecha, o usar Neon/Supabase (que sí tienen free tier persistente)
  # como reemplazo desde el día uno.
  - name: dtll-db
    plan: free
    databaseName: dtll_db
    user: dtll
